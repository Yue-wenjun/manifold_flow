<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifold Flow v2.0 - Tensor Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Glassmorphism control panel */
        #ui-panel {
            position: absolute; top: 20px; left: 20px; width: 320px; z-index: 10;
            background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; color: #00ffcc; text-transform: uppercase; letter-spacing: 1px;}

        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #aaa; }
        select, button {
            width: 100%; padding: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 255, 204, 0.3);
            color: #fff; border-radius: 4px; outline: none; cursor: pointer; transition: all 0.3s;
        }
        select:hover, button:hover { border-color: #00ffcc; }
        button { background: rgba(0, 255, 204, 0.1); font-weight: bold; margin-top: 10px; }
        button:active { background: rgba(0, 255, 204, 0.3); }
        button.danger { background: rgba(255, 50, 50, 0.1); border-color: rgba(255, 50, 50, 0.3); color: #ff5555; }
        button.danger:hover { border-color: #ff5555; }

        /* Dynamically generated parameter slider styles */
        .slider-container { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
        input[type=range] { flex-grow: 1; margin: 0 10px; accent-color: #00ffcc; }
        .param-value { font-size: 0.8rem; min-width: 40px; text-align: right; color: #00ffcc; }

        /* Render toggle switches */
        .render-toggles { border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; margin-top: 15px; }
        .toggle-label { display: flex; align-items: center; cursor: pointer; font-size: 0.95rem; font-weight: bold; margin-bottom: 10px; }
        .toggle-label input { margin-right: 10px; transform: scale(1.3); cursor: pointer; }

        #status-bar { position: absolute; bottom: 20px; left: 20px; z-index: 10; font-family: monospace; font-size: 0.85rem; color: #00ffcc; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>🌌 Manifold Engine</h2>

        <div class="control-group">
            <label for="system-select">Target System</label>
            <select id="system-select">
                <option value="">Loading systems...</option>
            </select>
        </div>

        <div id="parameters-container">
            </div>

        <div class="control-group" style="border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; margin-top: 15px;">
            <label style="color: #ffaa00; font-weight: bold;">⚡ Performance</label>
            <div class="control-group" style="margin-top: 8px;">
                <label>Particles <span style="font-size:0.75rem; color:#666;">(more = slower)</span></label>
                <div class="slider-container">
                    <input type="range" id="num-particles" min="50" max="1000" step="50" value="50">
                    <span class="param-value" id="val-particles">50</span>
                </div>
            </div>
            <div class="control-group">
                <label>Compute Steps/Frame <span style="font-size:0.75rem; color:#666;">(more = smoother)</span></label>
                <div class="slider-container">
                    <input type="range" id="steps-per-emit" min="2" max="10" step="1" value="2">
                    <span class="param-value" id="val-steps">2</span>
                </div>
            </div>
        </div>

        <div class="render-toggles">
            <label class="toggle-label" style="color: #00ffff;">
                <input type="checkbox" id="toggle-traj" checked> Show Trajectory History
            </label>
            <label class="toggle-label" style="color: #ff00ff;">
                <input type="checkbox" id="toggle-part" checked> Show Live Particles
            </label>
        </div>

        <button id="btn-start">START SIMULATION</button>
        <button id="btn-stop" class="danger" style="display: none;">STOP SIMULATION</button>
    </div>

    <div id="status-bar">Status: Disconnected</div>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="/static/js/visualization_hybrid.js"></script>

</body>
</html>
